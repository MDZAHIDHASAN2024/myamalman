<!doctype html>
<html lang="bn" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="google" content="notranslate" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a7a4a" />
    <meta
      name="description"
      content="My Amal - Islamic Daily Amal Tracker - নামাজ, রোজা, কুরআন ট্র্যাকার"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="My Amal" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>My Amal - আমার আমল</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #0d4f2e;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash-icon {
        width: 100px;
        height: 100px;
        border-radius: 24px;
        margin-bottom: 20px;
      }
      #splash-title {
        color: #22c55e;
        font-size: 28px;
        font-weight: 900;
        font-family: Inter, sans-serif;
      }
      #splash-sub {
        color: rgba(255, 255, 255, 0.6);
        font-size: 13px;
        margin-top: 6px;
        font-family: Inter, sans-serif;
      }
      #splash-dev {
        position: absolute;
        bottom: 24px;
        color: #ff4444;
        font-size: 16px;
        font-weight: 900;
        font-family: Inter, sans-serif;
        text-align: center;
        letter-spacing: 0.3px;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img id="splash-icon" src="/icon-192x192.png" alt="My Amal" />
      <div id="splash-title">My Amal</div>
      <div id="splash-sub">আমার আমল ট্র্যাকার</div>
      <div id="splash-dev">Developed by Zahid Hasan | 01745940065</div>
    </div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => splash.remove(), 400);
          }
        }, 1200);
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
      });
    </script>
  </body>
</html>
