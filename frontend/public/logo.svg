<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d4f2e"/>
      <stop offset="100%" style="stop-color:#1a7a4a"/>
    </linearGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Subtle pattern -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="40"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="20"/>
  <!-- Crescent moon -->
  <path d="M 290 140 
    A 100 100 0 1 0 290 370
    A 70 70 0 1 1 290 140 Z" fill="url(#moon)"/>
  <!-- Star -->
  <polygon points="340,165 350,195 382,195 357,213 367,243 340,225 313,243 323,213 298,195 330,195"
    fill="#fbbf24" opacity="0.95"/>
  <!-- Bottom text area -->
  <rect x="80" y="390" width="352" height="60" rx="16" fill="rgba(255,255,255,0.1)"/>
  <!-- MA text -->
  <text x="256" y="434" font-family="Arial Black, sans-serif" font-size="36" font-weight="900"
    fill="white" text-anchor="middle" letter-spacing="4">MY AMAL</text>
</svg>